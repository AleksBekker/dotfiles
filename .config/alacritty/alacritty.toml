
[window]
opacity = 0.95
dynamic_padding = true
dynamic_title = true

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "regular" }
size = 16

[keyboard]
bindings = [
    # { <key>, <mods>, <mode>, <action> | <chars> },
{ key="n", mods="Control | Shift", action="CreateNewWindow" },
]

[general]
import = [
    "./tokyo-night/tokyo-night.toml"
]
