set-option -sa terminal-features ',xterm:RGB'
set-option -g default-terminal "tmux-256color"
set-option -g terminal-overrides ",xterm-256color:RGB"

set -g detach-on-destroy off
set -g renumber-windows on

# Clipboard interaction
set -g set-clipboard on
setw -g mode-keys vi

# Start counting windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Settings for Neovim
set-option -sg escape-time 10
set-option -g focus-events on

# vim-like pane switching and resizing
bind -r ^ last-window
bind k select-pane -U
bind j select-pane -D
bind h select-pane -L
bind l select-pane -R
bind-key -r -T prefix   C-k     resize-pane -U 5
bind-key -r -T prefix   C-j     resize-pane -D 5
bind-key -r -T prefix   C-h     resize-pane -L 5
bind-key -r -T prefix   C-l     resize-pane -R 5
set -g repeat-time 1000

# Plugin manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# set -g @tokyo-night-tmux_theme storm
# set -g @tokyo-night-tmux_transparent 1
# set -g @tokyo-night-tmux_window_id_style digital
# set -g @tokyo-night-tmux_pane_id_style hsquare
# set -g @tokyo-night-tmux_zoom_id_style dsquare
# set -g @tokyo-night-tmux_time_format 12H

# Gruber Darker Colors
gruber_bg="#181818"
gruber_fg="#f5f5f5"
gruber_yellow="#ffdd66"
gruber_green="#95a99f"
gruber_red="#f43841"

# Status Bar Styling
set -g status-style bg=$gruber_bg,fg=$gruber_fg
set -g status-left-style bg=$gruber_bg,fg=$gruber_yellow
set -g status-right-style bg=$gruber_bg,fg=$gruber_green

# Window Status
set -g window-status-current-style fg=$gruber_yellow,bg=$gruber_bg
set -g window-status-style bg=$gruber_bg,fg=$gruber_fg

# Pane Borders
set -g pane-border-style fg=$gruber_bg
set -g pane-active-border-style fg=$gruber_green

# Message Style
set -g message-style fg=$gruber_yellow,bg=$gruber_bg

# Run package manager
run '~/.config/tmux/plugins/tpm/tpm'
